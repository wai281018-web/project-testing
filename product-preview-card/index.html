<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="css/style.css">
  
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="icon" href="images/favicon-32x32.png" type="image/png">

  
</head>
<body>

 
    <div class="container">
    <div class="card-image">
      <img src="images/image-product-desktop.jpg" alt="Perfume">
    </div>
    <div class="card-content">
      <p class="category"> PERFUME</p>
      <h1>Gabrielle Essence Eau De Parfum</h1>
      <p class="desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p>
  <div class="price">
    <span class="new1">$149.99</span>
    <span class="new2"><del>$169.99</del></span>
  </div>

  <button class="cart-btn">
    <img src="images/icon-cart.svg" alt="icon">
    Add to Cart</button>
    
    </div>
  </div>

  
</body>
</html>
